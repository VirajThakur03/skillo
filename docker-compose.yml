services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  web:
    build: .
    container_name: sklio-web
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      - ENV=${ENV:-development}
      - FLASK_APP=${FLASK_APP}
      - FLASK_ENV=${FLASK_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STITCH_API_KEY=${STITCH_API_KEY}
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED}
      - UPLOAD_FOLDER=${UPLOAD_FOLDER}
      - STORAGE_BACKEND=${STORAGE_BACKEND}
      - DOCUMENT_RETENTION_DAYS=${DOCUMENT_RETENTION_DAYS}
      - KEEP_FAILED_VERIFICATION_MEDIA=${KEEP_FAILED_VERIFICATION_MEDIA}
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER}
      - PAYMENT_MODE=${PAYMENT_MODE}
      - ALLOW_MOCK_PAYMENTS=${ALLOW_MOCK_PAYMENTS}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_API_MODE=${STRIPE_API_MODE}
      - PAYMENT_SUCCESS_URL=${PAYMENT_SUCCESS_URL}
      - PAYMENT_CANCEL_URL=${PAYMENT_CANCEL_URL}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_API_REQUESTS=${LOG_API_REQUESTS}
      - ERROR_MONITOR_DSN=${ERROR_MONITOR_DSN}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - SOCKETIO_ASYNC_MODE=${SOCKETIO_ASYNC_MODE:-threading}
      - SOCKETIO_MESSAGE_QUEUE=${SOCKETIO_MESSAGE_QUEUE}
      - SOCKETIO_CHANNEL=${SOCKETIO_CHANNEL}
      - SOCKETIO_CORS_ALLOWED_ORIGINS=${SOCKETIO_CORS_ALLOWED_ORIGINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - RATELIMIT_STORAGE_URI=${RATELIMIT_STORAGE_URI}
      - RUN_MIGRATIONS_ON_START=${RUN_MIGRATIONS_ON_START:-true}
      - ALLOW_UNSAFE_WERKZEUG=${ALLOW_UNSAFE_WERKZEUG:-true}
      - PYTHONPATH=/app
      - RUNNING_IN_DOCKER=true
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    working_dir: /app
    command: ["./run_prod.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:
