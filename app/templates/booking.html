{% extends "base.html" %}

{% block content %}
<div class="card glass">
  <h2>Book: {{ skill.title }}</h2>
  <p class="muted">Provider: {{ skill.provider.name }}</p>

  <form id="bookingForm">
    <label>Date & Time</label>
    <input id="scheduled_at" type="datetime-local" required />

    <label>Duration</label>
    <select id="duration">
      <option value="60">1 hour</option>
      <option value="120">2 hours</option>
      <option value="180">3 hours</option>
    </select>

    <p><strong>Price:</strong> ₹{{ '%.0f'|format(skill.price) }}</p>
    <p id="walletInfo" class="muted"></p>

    <button class="btn primary" id="bookBtn">
      Confirm Booking
    </button>
  </form>

  <p id="status" class="muted" style="margin-top:8px;"></p>
  <pre id="resp" style="margin-top:10px;"></pre>

  <div id="paySection" style="margin-top:14px;"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
import { getToken, authFetch } from "/static/js/main.js";

const walletInfoEl = document.getElementById("walletInfo");
const statusEl = document.getElementById("status");
const respEl = document.getElementById("resp");
const payDiv = document.getElementById("paySection");
const btn = document.getElementById("bookBtn");

/* ---------------- PROVIDER FROM URL ---------------- */
const params = new URLSearchParams(window.location.search);
const providerId = params.get("provider");

if (!providerId) {
  alert("Provider missing. Please select a provider again.");
  window.location.replace("/home");
}

/* ---------------- WALLET ---------------- */
async function loadWallet() {
  if (!getToken()) {
    walletInfoEl.innerText =
      "Please login as seeker before booking.";
    return;
  }

  const res = await authFetch("/api/auth/me");
  if (res.ok) {
    walletInfoEl.innerText =
      `Wallet credits: ₹${Number(res.data.wallet_balance || 0).toFixed(0)} (used first)`;
  } else {
    walletInfoEl.innerText = "Unable to load wallet info.";
  }
}

/* ---------------- BOOKING ---------------- */
async function submitBooking(e) {
  e.preventDefault();

  if (!getToken()) {
    window.location.replace("/demo_login");
    return;
  }

  const scheduled_at = document.getElementById("scheduled_at").value;
  const duration = Number(document.getElementById("duration").value);

  if (!scheduled_at) {
    statusEl.innerText = "Please select date & time";
    return;
  }

  btn.disabled = true;
  statusEl.innerText = "Creating booking…";

  const res = await authFetch("/api/bookings", {
    method: "POST",
    body: JSON.stringify({
      skill_id: {{ skill.id }},
      provider_id: providerId,      // ✅ REQUIRED
      scheduled_at,
      duration_minutes: duration
    })
  });

  respEl.innerText = JSON.stringify(res.data, null, 2);

  if (!res.ok) {
    statusEl.innerText = res.data?.error || "Booking failed";
    btn.disabled = false;
    return;
  }

  statusEl.innerText = "Booking created ✔";

  const bookingId = res.data.id;
  const remaining = res.data.payable_amount || 0;
  const referralUsed = res.data.wallet_used || 0;

  const chatUrl  = `/chat/booking_${bookingId}`;
  const trackUrl = `/track/${bookingId}`;

  if (remaining > 0) {
    payDiv.innerHTML = `
      <p>Remaining to pay: ₹${remaining.toFixed(0)}</p>
      <p class="muted">Referral used: ₹${referralUsed.toFixed(0)}</p>
      <button class="btn neon" id="payBtn">Pay Now</button>
      <p>
        <a href="${chatUrl}">Chat</a> •
        <a href="${trackUrl}">Track</a>
      </p>
    `;

    document
      .getElementById("payBtn")
      .addEventListener("click", () => payBooking(bookingId));
  } else {
    payDiv.innerHTML = `
      <p>No payment required (wallet covered full amount)</p>
      <p>
        <a href="${chatUrl}">Chat</a> •
        <a href="${trackUrl}">Track</a>
      </p>
    `;
  }
}

/* ---------------- PAYMENT ---------------- */
async function payBooking(bookingId) {
  statusEl.innerText = "Processing payment…";

  const res = await authFetch(`/api/bookings/${bookingId}/pay`, {
    method: "POST",
    body: JSON.stringify({
      payment_ref: `DEMO-${bookingId}`
    })
  });

  if (res.ok) {
    alert("Payment successful!");
    window.location.replace(`/track/${bookingId}`);
  } else {
    alert(res.data?.error || "Payment failed");
  }
}

/* ---------------- INIT ---------------- */
document
  .getElementById("bookingForm")
  .addEventListener("submit", submitBooking);

document.addEventListener("DOMContentLoaded", loadWallet);
</script>
{% endblock %}
