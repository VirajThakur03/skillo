<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sklio — Login / Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: Poppins, Arial;
      background:#f7fafc;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }
    .box{
      background:#fff;
      padding:24px;
      border-radius:12px;
      width:420px;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
    }
    input, select, button{
      width:100%;
      padding:10px;
      margin:6px 0;
      border-radius:8px;
      border:1px solid #e2e8f0;
    }
    button{
      background:#1E6FF5;
      color:white;
      border:none;
      cursor:pointer;
    }
    .muted{ color:#64748B; font-size:13px; }
    hr{ margin:16px 0; border:none; border-top:1px solid #e5e7eb; }
  </style>
</head>

<body>
  <div class="box">
    <h3>Register</h3>
    <input id="name" placeholder="Name" />
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <select id="role">
      <option value="seeker">Seeker</option>
      <option value="provider">Provider</option>
    </select>
    <button id="registerBtn">Register</button>

    <hr/>

    <h3>Login</h3>
    <input id="login_email" placeholder="Email" />
    <input id="login_password" type="password" placeholder="Password" />
    <button id="loginBtn">Login</button>

    <pre id="output"></pre>
  </div>

  <!-- ✅ MODULE SCRIPT -->
  <script type="module">
  import { setToken, getLocation } from "/static/js/main.js";

  const out = document.getElementById('output');

  // =========================
  // REGISTER
  // =========================
  async function register(){
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;

    if(!name || !email || !password){
      alert("All fields required");
      return;
    }

    const loc = await getLocation();
    const payload = { name, email, password, role };

    if(loc){
      payload.latitude = loc.latitude;
      payload.longitude = loc.longitude;
    }

    const res = await fetch('/api/auth/register', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    out.textContent = JSON.stringify(data, null, 2);

    if (!res.ok || !data.access_token) return;

    setToken(data.access_token);
    localStorage.setItem('sklio_user', JSON.stringify(data.user));

    // 🔐 PROVIDER ALWAYS STARTS WITH DOCUMENT
    if (data.user.role === "PROVIDER") {
      window.location.href = "/provider_verification";
      return;
    }

    // seeker
    window.location.href = "/home";
  }

  // =========================
  // LOGIN
  // =========================
  async function login(){
    const email = document.getElementById('login_email').value.trim();
    const password = document.getElementById('login_password').value;

    if(!email || !password){
      alert("Email & password required");
      return;
    }

    const res = await fetch('/api/auth/login', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    out.textContent = JSON.stringify(data, null, 2);

    if (!res.ok || !data.access_token) return;

    setToken(data.access_token);
    localStorage.setItem('sklio_user', JSON.stringify(data.user));

    // 🔐 PROVIDER VERIFICATION FLOW (ORDER MATTERS)
    if (data.user.role === "PROVIDER") {

      // 1️⃣ Aadhaar / Document missing
      if (!data.user.document_filename) {
        window.location.href = "/provider_verification";
        return;
      }

      // 2️⃣ Face video missing
      if (!data.user.verification_video_filename) {
        window.location.href = "/provider_verification_video";
        return;
      }
    }

    // 3️⃣ seeker OR fully verified provider
    window.location.href = "/home";
  }

  document.getElementById('registerBtn').onclick = register;
  document.getElementById('loginBtn').onclick = login;
</script>

</body>
</html>
