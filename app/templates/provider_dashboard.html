{% extends "base.html" %}

{% block content %}
<div class="card glass">
  <h2>Provider Dashboard</h2>
  <p class="muted" id="providerMeta"></p>

  <hr>

  <h3>🟡 Pending Jobs</h3>
  <div id="pendingJobs"></div>

  <h3 style="margin-top:20px;">🟢 Active Jobs</h3>
  <div id="activeJobs"></div>

  <h3 style="margin-top:20px;">✅ Completed Jobs</h3>
  <div id="completedJobs"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
import { authFetch } from "/static/js/main.js";

/* ===============================
   LOAD DASHBOARD
================================ */
async function loadDashboard(){
  const res = await authFetch("/api/provider/dashboard");
  if(!res.ok){
    alert(res.data?.error || "Not authorized");
    return;
  }

  const { provider, bookings } = res.data;

  document.getElementById("providerMeta").innerHTML = `
    ⭐ ${provider.rating || 0} rating •
    ${provider.completed_jobs || 0} jobs •
    ₹${provider.wallet_balance || 0} wallet
    ${provider.is_verified ? " • ✅ Verified" : ""}
  `;

  renderJobs("pendingJobs", bookings.pending);
  renderJobs("activeJobs", bookings.active);
  renderJobs("completedJobs", bookings.completed);
}

/* ===============================
   RENDER JOB CARDS
================================ */
function renderJobs(containerId, jobs){
  const el = document.getElementById(containerId);

  if(!jobs || jobs.length === 0){
    el.innerHTML = "<p class='muted'>No jobs</p>";
    return;
  }

  el.innerHTML = jobs.map(j => `
    <div class="card glass" style="margin-bottom:10px;">
      <b>${j.skill}</b><br>
      Seeker: ${j.seeker}<br>
      Scheduled: ${new Date(j.scheduled_at).toLocaleString()}<br>
      Price: ₹${j.price}<br>
      Status: <b>${j.status}</b>

      <div style="margin-top:8px;">
        ${renderActions(j)}
      </div>
    </div>
  `).join("");
}

/* ===============================
   ACTION BUTTONS
================================ */
function renderActions(job){
  if(job.status === "PENDING"){
    return `
      <button class="btn primary" onclick="window.decide(${job.id}, 'accept')">
        Accept
      </button>
      <button class="btn ghost" onclick="window.decide(${job.id}, 'reject')">
        Reject
      </button>
    `;
  }

  if(job.status === "CONFIRMED"){
    return `
      <a class="btn neon" href="/worker_track/${job.id}">
        Share Live Location
      </a>
      <button class="btn primary" onclick="window.completeJob(${job.id})">
        Complete
      </button>
    `;
  }

  return "";
}

/* ===============================
   API ACTIONS (GLOBAL)
================================ */
window.decide = async function(id, action){
  const res = await authFetch(`/api/bookings/${id}/decision`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ action })
  });

  if(!res.ok){
    alert(res.data?.error || "Failed to update booking");
    return;
  }

  alert(`Booking ${action}ed`);
  loadDashboard();
};

window.completeJob = async function(id){
  const res = await authFetch(`/api/bookings/${id}/complete`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    }
  });

  if(!res.ok){
    alert(res.data?.error || "Failed to complete job");
    return;
  }

  alert("Job completed ✔");
  loadDashboard();
};

/* ===============================
   INIT
================================ */
loadDashboard();
</script>

{% endblock %}
