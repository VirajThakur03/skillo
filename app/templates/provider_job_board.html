{% extends "base.html" %}

{% block title %}Provider Job Board | Sklio{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="card mk-card">
      <div class="badge-row">
        <span class="chip">Provider Dashboard</span>
        <span class="chip success">Opportunity Board</span>
      </div>
      <h2 class="mk-display-md" style="margin-top:16px;">Available Jobs</h2>
      <p class="mk-body-sm">Find and apply for jobs that match your skills.</p>

      <div id="providerJobList" style="margin-top:24px;" class="grid">
        <div class="mk-card mk-empty-state" style="padding: 40px; text-align: center; border-style: dashed;">
            <i data-lucide="search" style="width:48px;height:48px;color:var(--gray-300);margin-bottom:16px;"></i>
            <p class="mk-body-sm" style="color: var(--gray-500);">Loading opportunities...</p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script type="module">
import { authFetch } from "/static/js/main.js";

const providerJobList = document.getElementById("providerJobList");

async function fetchProviderJobs() {
    try {
        const res = await authFetch("/api/jobs"); // Use the same public API for now
        const jobs = res.data;
        renderJobs(jobs);
    } catch (err) {
        providerJobList.innerHTML = `<div class="card mk-card"><p class="mk-body-sm error">Failed to load jobs.</p></div>`;
    }
}

function renderJobs(jobs) {
    if (!jobs || jobs.length === 0) {
        providerJobList.innerHTML = `
            <div class="mk-card mk-empty-state" style="padding: 40px; text-align: center; border-style: dashed; max-width: 100%;">
                <i data-lucide="info" style="width:48px;height:48px;color:var(--gray-300);margin-bottom:16px;"></i>
                <p class="mk-body-sm" style="color: var(--gray-500);">No open jobs available right now.</p>
            </div>
        `;
        if (window.lucide) window.lucide.createIcons();
        return;
    }

    providerJobList.innerHTML = jobs.map(job => `
        <div class="mk-card mk-stagger-child" style="padding: 20px;">
            <div style="display:flex; justify-content:space-between; align-items:start; flex-wrap:wrap; gap:16px;">
                <div style="flex:1;">
                    <h3 class="mk-heading">${escapeHtml(job.title)}</h3>
                    <p class="mk-body-sm muted" style="margin-bottom:12px;">${escapeHtml(job.description || "No description.")}</p>
                    <div class="badge-row">
                        <span class="chip success">Budget: INR ${job.budget_max || 'Flexible'}</span>
                        <span class="chip">${escapeHtml(job.location || "Remote")}</span>
                    </div>
                </div>
                <a href="/jobs/${job.id}" class="btn primary">Apply Now</a>
            </div>
        </div>
    `).join("");
    
    if (window.lucide) window.lucide.createIcons();
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

fetchProviderJobs();
</script>
{% endblock %}
